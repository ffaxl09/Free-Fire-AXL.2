 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF-AXL | Pro Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Kanit:wght@900&display=swap');
        
        :root {
            --game-purple: #2a1b3d;
            --game-dark: #120c1f;
            --game-yellow: #ffcc00;
            --game-accent: #00e5ff;
        }

        body {
            background-color: var(--game-dark);
            color: white;
            font-family: 'Kanit', sans-serif;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* Game Style Sidebar */
        .sidebar-tab {
            background: linear-gradient(90deg, #1a1228, #2a1b3d);
            border-left: 4px solid transparent;
            transition: 0.3s;
        }
        .sidebar-tab.active {
            border-left-color: var(--game-yellow);
            background: linear-gradient(90deg, rgba(255,204,0,0.2), #2a1b3d);
            color: var(--game-yellow);
        }

        /* Professional Card Look */
        .item-card {
            background: #3b2a5a;
            border-radius: 4px;
            position: relative;
            border-bottom: 4px solid rgba(0,0,0,0.4);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .item-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
        }

        .price-btn {
            background: var(--game-yellow);
            color: #000;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            font-weight: 900;
        }

        /* Glow Effects */
        .glow-text { text-shadow: 0 0 10px var(--game-accent); }
        
        #payment-modal {
            backdrop-filter: blur(8px);
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-[#1a1228]">
        <div class="italic text-2xl tracking-tighter">FF-AXL <span class="text-yellow-400">STORE</span></div>
        <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/10">
            <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-4 h-4">
            <span class="text-xs text-cyan-400">TOP-UP EVENT</span>
        </div>
    </header>

    <div class="flex flex-1">
        <div class="w-24 bg-[#120c1f] flex flex-col border-r border-white/5">
            <div id="tab-topup" onclick="switchTab('topup')" class="sidebar-tab active p-4 text-center cursor-pointer">
                <i class="fas fa-gem mb-1"></i>
                <div class="text-[9px] uppercase">Top-up</div>
            </div>
            <div id="tab-member" onclick="switchTab('member')" class="sidebar-tab p-4 text-center cursor-pointer">
                <i class="fas fa-id-card mb-1"></i>
                <div class="text-[9px] uppercase">Member</div>
            </div>
        </div>

        <main class="flex-1 p-4 space-y-6">
            <div class="bg-black/40 p-3 rounded border border-yellow-500/20 flex items-center gap-3">
                <div class="bg-yellow-500 text-black text-[10px] px-2 py-0.5 rounded font-black italic">UID</div>
                <input type="number" id="uid" placeholder="ENTER PLAYER ID..." class="bg-transparent border-none outline-none text-yellow-400 placeholder:text-gray-600 w-full text-sm">
            </div>

            <div id="topup-grid" class="grid grid-cols-2 gap-3">
                <div class="item-card p-3 flex flex-col items-center" onclick="openPay('100 Diamonds', 32)">
                    <div class="absolute top-0 left-0 bg-red-600 text-[8px] px-2 py-0.5">-60%</div>
                    <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-12 h-12 my-2 drop-shadow-[0_0_10px_#00e5ff]">
                    <div class="text-xs text-gray-300">100 Diamonds</div>
                    <div class="w-full price-btn py-1 mt-2 text-center text-sm">₹32.00</div>
                </div>
                <div class="item-card p-3 flex flex-col items-center" onclick="openPay('310 Diamonds', 96)">
                    <div class="absolute top-0 left-0 bg-red-600 text-[8px] px-2 py-0.5">-60%</div>
                    <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-12 h-12 my-2 drop-shadow-[0_0_10px_#00e5ff]">
                    <div class="text-xs text-gray-300">310 Diamonds</div>
                    <div class="w-full price-btn py-1 mt-2 text-center text-sm">₹96.00</div>
                </div>
            </div>

            <div id="member-grid" class="hidden space-y-3">
                <div class="item-card p-4 flex justify-between items-center" onclick="openPay('Weekly Membership', 64)">
                    <div>
                        <div class="text-cyan-400 text-sm italic font-black">WEEKLY VIP</div>
                        <div class="text-[9px] text-gray-400 italic">CREDIT INSTANTLY</div>
                    </div>
                    <div class="price-btn px-6 py-1">₹64.00</div>
                </div>
            </div>
        </main>
    </div>

    <div id="payment-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80">
        <div class="bg-[#2a1b3d] w-full max-w-sm rounded-lg border-2 border-yellow-500/50 overflow-hidden shadow-[0_0_50px_rgba(0,0,0,1)]">
            <div class="bg-yellow-500 p-2 text-black text-center text-xs font-black italic">SECURE TRANSACTION</div>
            
            <div class="p-6 text-center space-y-4">
                <div id="modal-item" class="text-cyan-400 italic text-sm tracking-widest">100 DIAMONDS</div>
                <div id="modal-price" class="text-5xl font-black italic">₹32.00</div>
                
                <div class="bg-white p-2 rounded inline-block shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    <img src="Screenshot_20260404-151400_PhonePe~2.png" class="w-48 h-48" alt="QR Code">
                </div>

                <div class="text-[10px] text-gray-400">UPI: 8860269931@ybl</div>

                <div class="space-y-3 pt-2">
                    <input type="file" id="ss" class="hidden" onchange="document.getElementById('ss-label').innerText='FILE LOADED ✅'">
                    <label for="ss" id="ss-label" class="block border border-dashed border-white/20 p-3 rounded text-[10px] cursor-pointer hover:bg-white/5">UPLOAD PAYMENT SCREENSHOT</label>
                    <div class="flex gap-2">
                        <button onclick="closePay()" class="flex-1 bg-white/5 py-3 rounded text-xs font-bold uppercase">Back</button>
                        <button onclick="confirm()" class="flex-1 bg-yellow-500 text-black py-3 rounded text-xs font-black uppercase">Purchase</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('topup-grid').classList.add('hidden');
            document.getElementById('member-grid').classList.add('hidden');

            if(type === 'topup') {
                document.getElementById('tab-topup').classList.add('active');
                document.getElementById('topup-grid').classList.remove('hidden');
            } else {
                document.getElementById('tab-member').classList.add('active');
                document.getElementById('member-grid').classList.remove('hidden');
            }
        }

        function openPay(name, price) {
            if(!document.getElementById('uid').value) return alert("❌ Please Enter UID");
            document.getElementById('modal-item').innerText = name.toUpperCase();
            document.getElementById('modal-price').innerText = "₹" + price + ".00";
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closePay() { document.getElementById('payment-overlay').style.display = 'none'; } // Updated Logic
        function closePay() { document.getElementById('payment-modal').style.display = 'none'; }

        function confirm() {
            if(!document.getElementById('ss').files[0]) return alert("📸 Upload Payment Proof First!");
            alert("✅ ORDER PLACED! Verification in progress...");
            location.reload();
        }
    </script>
</body>
</html>
