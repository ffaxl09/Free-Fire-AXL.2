 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF-AXL | Diamond Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&display=swap');
        
        :root {
            --game-purple: #2a1b3d;
            --game-yellow: #ffcc00;
            --game-bg: #0f081d;
        }

        body {
            background-color: var(--game-bg);
            color: white;
            font-family: 'Kanit', sans-serif;
            user-select: none;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 80px;
            background: #0a0514;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            padding: 20px 0;
            text-align: center;
            font-size: 10px;
            color: #555;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .nav-item.active {
            color: var(--game-yellow);
            background: linear-gradient(90deg, rgba(255,204,0,0.1), transparent);
            border-left-color: var(--game-yellow);
        }

        /* Diamond Card Styling */
        .diamond-card {
            background: #2d1b4d;
            border-radius: 8px;
            border-bottom: 4px solid rgba(0,0,0,0.4);
            position: relative;
            transition: 0.2s;
        }

        .diamond-card:active { transform: scale(0.95); }

        .discount-tag {
            position: absolute;
            top: 0; left: 0;
            background: #ff3e3e;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 8px 0 12px 0;
            font-weight: 900;
        }

        .price-btn {
            background: var(--game-yellow);
            color: black;
            font-weight: 900;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
            width: 100%;
            padding: 4px 0;
            margin-top: 8px;
        }

        /* Payment Modal */
        #payment-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-[#1a0f2e] p-4 flex justify-between items-center border-b border-white/10">
        <div class="italic text-xl">FF-AXL <span class="text-yellow-400">STORE</span></div>
        <div class="bg-black/40 px-3 py-1 rounded border border-white/10 text-[10px] text-cyan-400">
            OFFICIAL TOP-UP
        </div>
    </header>

    <div class="flex flex-1">
        <div class="sidebar">
            <div class="nav-item active" onclick="tab('topup')">
                <i class="fas fa-gem text-xl mb-1"></i><br>TOP-UP
            </div>
            <div class="nav-item" onclick="tab('vip')">
                <i class="fas fa-crown text-xl mb-1"></i><br>VIP
            </div>
        </div>

        <main class="flex-1 p-4 overflow-y-auto">
            <div class="bg-black/30 p-3 rounded border border-white/5 mb-6">
                <p class="text-[10px] text-gray-500 uppercase mb-1">Player Login</p>
                <input type="number" id="uid" placeholder="ENTER UID" class="bg-transparent border-none outline-none text-yellow-400 font-bold w-full italic">
            </div>

            <div id="topup-section" class="grid grid-cols-2 gap-4">
                <div class="diamond-card p-4 flex flex-col items-center" onclick="pay('100 Diamonds', 32)">
                    <div class="discount-tag">60% OFF</div>
                    <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-12 h-10 mb-2 drop-shadow-md">
                    <p class="text-sm font-black">100 💎</p>
                    <div class="price-btn">₹32.00</div>
                </div>

                <div class="diamond-card p-4 flex flex-col items-center" onclick="pay('310 Diamonds', 96)">
                    <div class="discount-tag">60% OFF</div>
                    <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-14 h-12 mb-2 drop-shadow-md">
                    <p class="text-sm font-black">310 💎</p>
                    <div class="price-btn">₹96.00</div>
                </div>

                <div class="diamond-card p-4 flex flex-col items-center" onclick="pay('520 Diamonds', 160)">
                    <div class="discount-tag">60% OFF</div>
                    <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-16 h-14 mb-2 drop-shadow-lg">
                    <p class="text-sm font-black">520 💎</p>
                    <div class="price-btn">₹160.00</div>
                </div>

                <div class="diamond-card p-4 flex flex-col items-center" onclick="pay('1060 Diamonds', 320)">
                    <div class="discount-tag">60% OFF</div>
                    <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-20 h-16 mb-2 drop-shadow-xl">
                    <p class="text-sm font-black">1060 💎</p>
                    <div class="price-btn">₹320.00</div>
                </div>
            </div>

            <div id="vip-section" class="hidden space-y-4">
                <div class="diamond-card p-6 flex justify-between items-center" onclick="pay('Weekly VIP', 64)">
                    <div>
                        <p class="text-cyan-400 font-black italic">WEEKLY VIP</p>
                        <p class="text-[10px] text-gray-400">INSTANT 100 💎</p>
                    </div>
                    <div class="price-btn px-6 w-auto">₹64.00</div>
                </div>
            </div>
        </main>
    </div>

    <div id="payment-modal">
        <div class="bg-[#1a0f2e] w-full max-w-sm rounded-xl p-6 border-2 border-yellow-500/30 text-center">
            <h2 id="m-name" class="text-yellow-400 font-black tracking-widest italic mb-1"></h2>
            <h1 id="m-price" class="text-5xl font-black mb-6 italic"></h1>
            
            <div class="bg-white p-3 rounded-lg inline-block shadow-2xl mb-4">
                <img src="Screenshot_20260404-151400_PhonePe~2.png" class="w-52 h-52">
            </div>
            
            <p class="text-[10px] text-cyan-400 font-bold mb-4">UPI: 8860269931@ybl</p>
            
            <input type="file" id="ss" class="hidden" onchange="document.getElementById('ss-label').innerText='SCREENSHOT LOADED'">
            <label for="ss" id="ss-label" class="block bg-white/5 border border-dashed border-white/20 p-3 rounded mb-6 text-[10px] font-bold cursor-pointer">UPLOAD PAYMENT SCREENSHOT</label>
            
            <div class="flex gap-2">
                <button onclick="document.getElementById('payment-modal').style.display='none'" class="flex-1 bg-gray-800 py-3 rounded text-xs font-bold">CANCEL</button>
                <button onclick="confirm()" class="flex-1 bg-yellow-500 text-black py-3 rounded text-xs font-black">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <script>
        function tab(type) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('topup-section').classList.add('hidden');
            document.getElementById('vip-section').classList.add('hidden');
            
            if(type === 'topup') {
                document.getElementById('topup-section').classList.remove('hidden');
                event.currentTarget.classList.add('active');
            } else {
                document.getElementById('vip-section').classList.remove('hidden');
                event.currentTarget.classList.add('active');
            }
        }

        function pay(name, price) {
            if(!document.getElementById('uid').value) return alert("ENTER UID FIRST!");
            document.getElementById('m-name').innerText = name.toUpperCase();
            document.getElementById('m-price').innerText = "₹" + price + ".00";
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function confirm() {
            if(!document.getElementById('ss').files[0]) return alert("UPLOAD SCREENSHOT!");
            alert("ORDER SENT! DIAMONDS WILL BE ADDED SHORTLY.");
            location.reload();
        }
    </script>
</body>
</html>
