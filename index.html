 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF-AXL | Pro Gaming Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700;900&display=swap');
:root { --ff-dark: #070912; --ff-card: #121625; --ff-accent: #00e5ff; }
body { background-color: var(--ff-dark); color: #ffffff; font-family: 'Inter', sans-serif; user-select: none; }
.ff-font { font-family: 'Oswald', sans-serif; }
.card-pro { background: var(--ff-card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; transition: 0.3s; }
.card-pro.selected { border-color: var(--ff-accent); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); transform: translateY(-4px); }
.ff-btn-main { background: linear-gradient(90deg, #00e5ff, #00a2ff); color: #000; font-weight: 900; text-transform: uppercase; }
#payment-overlay { transition: 0.4s; transform: translateY(100%); display: none; z-index: 100; position: fixed; inset: 0; background: #070912; }
#payment-overlay.show { transform: translateY(0); display: flex; flex-direction: column; }
.qr-frame { background: white; padding: 12px; border-radius: 16px; display: inline-block; }
</style>
</head>
<body class="pb-20">

<header class="py-12 text-center border-b border-white/10">
    <h1 class="ff-font text-5xl font-bold italic uppercase">FF-AXL <span class="text-cyan-400">PRO</span></h1>
</header>

<main class="max-w-md mx-auto px-6 mt-8 space-y-6">
    <div class="card-pro p-6">
        <label class="text-[10px] font-black text-gray-500 uppercase block mb-2">Player UID</label>
        <input type="number" id="uid" placeholder="ENTER UID" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-xl font-bold text-white outline-none">
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="card-pro p-5 text-center cursor-pointer" onclick="select(this, 'Weekly', 32)">
            <p class="text-xs text-gray-400">Weekly</p>
            <p class="text-xl font-black">₹32</p>
        </div>
        <div class="card-pro p-5 text-center cursor-pointer" onclick="select(this, '100 Diamonds', 16)">
            <p class="text-xs text-gray-400">100 💎</p>
            <p class="text-xl font-black">₹16</p>
        </div>
    </div>

    <button onclick="openPay()" class="w-full ff-btn-main py-5 rounded-2xl text-xl font-black">Proceed to Pay</button>
</main>

<div id="payment-overlay">
    <div class="p-6 border-b border-white/5 flex justify-between items-center">
        <span class="ff-font text-xl italic">PAYMENT</span>
        <button onclick="closePay()" class="text-cyan-400 text-2xl">×</button>
    </div>
    <div class="flex-1 overflow-y-auto p-8 text-center space-y-6">
        <h3 id="amount-text" class="text-6xl font-black text-cyan-400">₹0</h3>
        <div class="qr-frame">
            <img src="Screenshot_20260404-151400_PhonePe~2.png" class="w-64 h-64 rounded-lg" alt="QR Code">
        </div>
        <p class="text-cyan-400 font-bold">UPI: 8860269931@ybl</p>
        <div class="text-left space-y-4">
            <input type="file" id="proof" class="hidden" onchange="document.getElementById('st').innerText='Selected: '+this.files[0].name">
            <label for="proof" class="block p-6 bg-white/5 border-2 border-dashed border-white/10 rounded-2xl text-center cursor-pointer">
                <span id="st" class="text-xs text-gray-500 font-bold uppercase">Upload Screenshot</span>
            </label>
            <button onclick="finish()" class="w-full bg-green-500 py-5 rounded-2xl font-black text-black">CONFIRM ORDER</button>
        </div>
    </div>
</div>

<script>
let sel = null;
function select(el, p, pr) {
    document.querySelectorAll('.card-pro').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected'); sel = { p, pr };
}
function openPay() {
    if(!document.getElementById('uid').value || !sel) return alert("Fill UID and Select Pack");
    document.getElementById('amount-text').innerText = "₹" + sel.pr;
    const ov = document.getElementById('payment-overlay');
    ov.style.display = 'flex'; setTimeout(() => ov.classList.add('show'), 10);
}
function closePay() {
    const ov = document.getElementById('payment-overlay');
    ov.classList.remove('show'); setTimeout(() => ov.style.display = 'none', 400);
}
function finish() {
    if(!document.getElementById('proof').files[0]) return alert("Upload Screenshot!");
    alert("Order Sent! Wait for processing.");
    location.reload();
}
</script>
</body>
</html>
