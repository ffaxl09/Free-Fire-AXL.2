<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF-AXL | Pro Gaming Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;700&display=swap');
        
        :root {
            --ff-dark: #070912;
            --ff-card: #121625;
            --ff-gold: #ffcc00;
            --ff-accent: #00e5ff;
        }

        body {
            background-color: var(--ff-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1a2235 0%, #070912 100%);
            user-select: none;
        }

        .ff-font { font-family: 'Oswald', sans-serif; }

        .header-gradient {
            background: linear-gradient(180deg, rgba(0, 229, 255, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .card-pro {
            background: var(--ff-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-pro.selected {
            border-color: var(--ff-accent);
            background: linear-gradient(145deg, #161c30 0%, #070912 100%);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            transform: translateY(-4px);
        }

        .diamond-svg {
            filter: drop-shadow(0 0 5px var(--ff-accent));
        }

        .badge-discount {
            background: #ff3b3b;
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 4px;
            position: absolute;
            top: 10px;
            right: 10px;
            letter-spacing: 0.5px;
        }

        #payment-overlay {
            backdrop-filter: blur(8px);
            background: rgba(7, 9, 18, 0.95);
            display: none;
        }

        #payment-overlay.show { display: flex; }

        .btn-primary {
            background: linear-gradient(90deg, #00e5ff 0%, #00a2ff 100%);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-10">

    <header class="header-gradient py-6 px-4 mb-8 text-center">
        <h1 class="ff-font text-4xl font-bold italic tracking-tighter text-white">
            FF-AXL <span class="text-[#00e5ff]">STORE</span>
        </h1>
        <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Instant Diamond Top-up</p>
    </header>

    <div class="max-w-md mx-auto px-4">
        
        <div class="card-pro p-5 mb-6">
            <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">Enter Player UID</label>
            <div class="relative">
                <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-[#00e5ff]"></i>
                <input type="number" id="uid" placeholder="e.g. 123456789" 
                    class="w-full bg-[#0a0d16] border border-gray-800 rounded-xl py-4 pl-12 pr-4 text-white focus:outline-none focus:border-[#00e5ff] transition-all font-bold">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-24" id="packs-container">
            <div class="card-pro p-4 relative cursor-pointer" onclick="selectPack(this, 100, 32)">
                <div class="badge-discount">SAVE 20%</div>
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-12 h-12 mx-auto mb-3 diamond-svg" alt="diamond">
                <div class="text-center">
                    <div class="ff-font text-xl font-bold">100+10</div>
                    <div class="text-[#00e5ff] font-black text-lg">₹32</div>
                </div>
            </div>

            <div class="card-pro p-4 relative cursor-pointer" onclick="selectPack(this, 310, 240)">
                <div class="badge-discount">POPULAR</div>
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-12 h-12 mx-auto mb-3 diamond-svg" alt="diamond">
                <div class="text-center">
                    <div class="ff-font text-xl font-bold">310+31</div>
                    <div class="text-[#00e5ff] font-black text-lg">₹240</div>
                </div>
            </div>

            <div class="card-pro p-4 relative cursor-pointer" onclick="selectPack(this, 520, 400)">
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-12 h-12 mx-auto mb-3 diamond-svg" alt="diamond">
                <div class="text-center">
                    <div class="ff-font text-xl font-bold">520+52</div>
                    <div class="text-[#00e5ff] font-black text-lg">₹400</div>
                </div>
            </div>

            <div class="card-pro p-4 relative cursor-pointer" onclick="selectPack(this, 1060, 800)">
                <div class="badge-discount">BEST VALUE</div>
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="w-12 h-12 mx-auto mb-3 diamond-svg" alt="diamond">
                <div class="text-center">
                    <div class="ff-font text-xl font-bold">1060+106</div>
                    <div class="text-[#00e5ff] font-black text-lg">₹800</div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full p-4 bg-[#070912]/80 backdrop-blur-md border-t border-gray-800">
            <button onclick="openPayment()" class="w-full btn-primary py-4 rounded-xl shadow-lg shadow-[#00e5ff]/20 text-lg">
                Buy Now
            </button>
        </div>
    </div>

    <div id="payment-overlay" class="fixed inset-0 z-50 flex-col items-center justify-center p-6">
        <button onclick="closePayment()" class="absolute top-6 right-6 text-gray-500 hover:text-white">
            <i class="fas fa-times text-2xl"></i>
        </button>

        <div class="card-pro w-full max-w-sm p-6 text-center border-t-4 border-t-[#00e5ff]">
            <h2 class="ff-font text-2xl font-bold mb-2 uppercase italic tracking-tighter">Secure Checkout</h2>
            
            <div class="my-6 p-4 bg-[#0a0d16] rounded-2xl border border-gray-800">
                <div class="text-xs text-gray-500 uppercase font-bold mb-1">Weekly Membership Pack</div>
                <div class="text-4xl font-black text-[#00e5ff] ff-font" id="amount-text">₹0</div>
            </div>

            <div class="bg-white p-3 rounded-2xl mb-4 w-56 mx-auto">
                <img id="qr-img" src="Screenshot_20260404-151400_PhonePe~2.png" class="w-full h-auto" alt="Scan to Pay">
            </div>

            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-6">Diamonds will be credited instantly after verification</p>

            <div class="space-y-3">
                <div class="text-xs font-bold text-[#00e5ff] mb-4">
                    UPI: <span id="upi-id">8860269931@ybl</span>
                </div>
                
                <label for="proof" class="flex items-center justify-center gap-3 w-full bg-[#1a2235] border-2 border-dashed border-gray-700 p-4 rounded-xl cursor-pointer hover:border-[#00e5ff] transition-all group">
                    <i class="fas fa-cloud-upload-alt text-2xl text-gray-500 group-hover:text-[#00e5ff]"></i>
                    <span class="text-sm font-bold text-gray-400 group-hover:text-white" id="file-status">Click to Upload Payment Proof</span>
                    <input type="file" id="proof" class="hidden" onchange="updateFileName()">
                </label>

                <button onclick="submitOrder()" class="w-full btn-primary py-4 rounded-xl mt-4">
                    Confirm Order
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-cyan-500 text-black px-8 py-3 rounded-full font-black text-sm uppercase hidden z-[100] shadow-2xl">
        Select Pack First
    </div>

    <script>
        let selected = { pack: null, price: 0 };

        function selectPack(el, pack, price) {
            document.querySelectorAll('.card-pro').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selected = { pack, price };
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function openPayment() {
            const uid = document.getElementById('uid').value;
            if(!uid) return showToast("❌ Enter Valid UID");
            if(!selected.pack) return showToast("💎 Select Pack First");

            document.getElementById('amount-text').innerText = "₹" + selected.price;
            document.getElementById('payment-overlay').classList.add('show');
        }

        function closePayment() {
            document.getElementById('payment-overlay').classList.remove('show');
        }

        function updateFileName() {
            const input = document.getElementById('proof');
            const status = document.getElementById('file-status');
            if(input.files.length > 0) {
                status.innerText = "Selected: " + input.files[0].name;
                status.classList.replace('text-gray-500', 'text-cyan-400');
            }
        }

        function submitOrder() {
            if(!document.getElementById('proof').files[0]) return showToast("📸 Upload Payment Proof!");
            showToast("🚀 Order Sent! Processing...");
            setTimeout(() => location.reload(), 3000);
        }
    </script>
</body>
</html>
